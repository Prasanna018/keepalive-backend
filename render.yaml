services:
  # The FastAPI Web Service
  - type: web
    name: keepalive-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Update if you use a different version
      - key: MONGO_URI
        sync: false # 🔒 Paste securely in Render Dashboard
      - key: JWT_SECRET
        sync: false # 🔒 Paste securely in Render Dashboard
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 43200
      - key: REDIS_URI
        sync: false # 🔒 Paste securely in Render Dashboard
      - key: CORS_ORIGINS
        value: https://keepalive-iota.vercel.app,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173

  # The Celery Worker & Beat Scheduler
  - type: worker
    name: keepalive-worker
    env: python
    buildCommand: pip install -r requirements.txt
    # The -B flag runs the beat scheduler alongside the worker
    startCommand: celery -A app.worker worker -B --loglevel=info --without-heartbeat --without-mingle --without-gossip
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Update if you use a different version
      - key: MONGO_URI
        sync: false # 🔒 Paste securely in Render Dashboard
      - key: REDIS_URI
        sync: false # 🔒 Paste securely in Render Dashboard
